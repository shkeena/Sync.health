<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SYNC.HEALTH CARE</title>
<style>
  /* Menghilangkan margin bawaan */
  body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }

  /* Wrapper untuk mengontrol iframe */
  .iframe-container {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }

  /* Pengaturan dasar iframe */
  .iframe-container iframe {
    width: 100%;
    height: 100%;
    border: none;
  }

  /* MEDIA QUERY UNTUK PORTRAIT (HP Tegak) */
  @media screen and (orientation: portrait) {
    .iframe-container iframe {
        width: 95%; /* Lebih lebar di portrait agar konten tidak terlalu sempit */
        margin-top: 10px;
    }
  }

  /* MEDIA QUERY UNTUK LANDSCAPE (HP Miring) */
  @media screen and (orientation: landscape) {
    .iframe-container iframe {
      /* Opsional: Sesuaikan jika ingin perilaku berbeda saat landscape */
     width: 80%; /* Lebih ringkas saat landscape */
        margin: 5px auto; /* Margin lebih kecil agar hemat ruang vertikal */
    }
  }
</style>

<div class="iframe-container">
  <iframe 
    src="https://script.google.com/macros/s/AKfycbyWgW4YficpmzXTj-gzv9iYREg2N3A8i-c_UQOls8yAAyZa2S3DaGJ3RoBvp2_N7LEk/exec"
    allow="geolocation; camera; microphone; fullscreen"
    sandbox="allow-forms allow-scripts allow-same-origin allow-popups">
  </iframe>
</div>
</body>
</html>
