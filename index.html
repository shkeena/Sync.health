<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <!-- Tambahkan minimal-ui untuk perilaku lebih baik di iOS/Android -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>SYNC.HEALTH CARE</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

  <style>
    /* 1. RESET & LAYOUT DASAR */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden; /* Mencegah scroll double antara main page dan iframe */
      background-color: #F8FAFC;
      font-family: 'Inter', sans-serif;
    }

    .app-wrapper {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
    }

    /* 2. HEADER */
    .main-header {
      background-color: #F8F9FA;
      color: #064E3B;
      height: 35px; /* Sedikit ditambah agar lebih nyaman */
      padding: 0 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #064E3B;
      font-size: 0.8rem;
    }

    /* 3. AREA IFRAME (DIBUAT LEBIH FLEKSIBEL) */
    .work-space {
      flex: 1;
      width: 100%;
      position: relative;
      background-color: #F8FAFC;
      /* Memungkinkan konten di dalam iframe untuk melakukan scroll */
      overflow-y: auto; 
      -webkit-overflow-scrolling: touch;
    }

    .work-space iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      /* Memastikan iframe tidak memotong konten saat landscape */
      min-height: 100%; 
    }

    /* 4. LOADING TRANSISI */
    .loading-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #ffffff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 10;
    }

    .spinner {
      width: 35px;
      height: 35px;
      border: 3px solid #E2E8F0;
      border-top: 3px solid #064E3B;
      border-radius: 50%;
      animation: putar 0.7s linear infinite;
    }

    .loading-text {
      margin-top: 10px;
      font-size: 0.75rem;
      color: #064E3B;
      font-weight: 700;
    }

    @keyframes putar {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div class="app-wrapper">
    <header class="main-header">
      <div class="header-title">
        <i class="bi bi-shield-check"></i> <span>Connecting Care</span>
      </div>
      <div class="system-status">
        <div class="status-dot"></div> Cloud Active
      </div>
    </header>

    <main class="work-space">
      <div class="loading-screen">
        <div class="spinner"></div>
        <div class="loading-text">MENGHUBUNGKAN...</div>
      </div>
      
      <iframe 
        src="https://script.google.com/macros/s/AKfycbxCJmdPfr0Ms8a47pjvIjTqpG-vHq8ixThZX2q4Ycj0MmmnqXLfCCu0--1X4ZxG0BV4/exec"
        allow="camera; microphone; geolocation"
        onload="hilangkanLoader()">
      </iframe>
    </main>
  </div>

  <script>
    function hilangkanLoader() {
      const loader = document.querySelector('.loading-screen');
      if (loader) {
        loader.style.opacity = '0';
        setTimeout(() => { loader.style.display = 'none'; }, 300);
      }
    }
  </script>
</body>
</html>
