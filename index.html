<!DOCTYPE html>
<html lang="id">
<head>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <meta charset="UTF-8">
  <!-- Viewport ini memaksa browser agar tidak melakukan auto-zoom -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SYNC.HEALTH CARE</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<style>
  body, html { margin: 0; padding: 0; overflow: hidden; }
  #wrapper {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }
  #myIframe {
    width: 100%;
    height: 100%;
    border: none;
  }
</style>

<div id="wrapper">
  <iframe id="myIframe" src="https://script.google.com/macros/s/AKfycbxUKEtOJNfWXxOvWjO-lx2yMizKPhqKMxPYZgNXbX9uABjDVwV1-nKe7DyUkDBAUbgl/exec"></iframe>
</div>

<script>
  // Teknik paksa agar iframe selalu mendeteksi lebar perangkat mobile
  window.onload = function() {
    var iframe = document.getElementById('myIframe');
    // Memberikan instruksi ke browser bahwa ini adalah layar mobile
    iframe.contentWindow.postMessage("mobile-view", "*");
  };
</script>
</body>
</html>
